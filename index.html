<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Someone Special ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
    position:relative;
}

.box{
    background:#fff;
    padding:30px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
    max-width:350px;
    z-index:2;
}

h1{
    color:#ff3366;
    margin-bottom:15px;
}

p{
    font-size:18px;
    margin-bottom:20px;
}

button{
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    margin:10px;
    transition:.3s;
}

#yes{
    background:#ff3366;
    color:#fff;
}

#yes:hover{
    transform:scale(1.08);
}

#no{
    background:#ddd;
}

#msg{
    margin-top:20px;
    font-size:22px;
    color:#ff3366;
    font-weight:bold;
}

/* Floating Hearts */
.hearts{
    position:fixed;
    inset:0;
    overflow:hidden;
    pointer-events:none;
}

.heart{
    position:absolute;
    bottom:-30px;
    color:#ff3366;
    animation:floatUp linear forwards;
}

@keyframes floatUp{
    0%{
        transform:translateY(0) scale(.8);
        opacity:0;
    }
    20%{
        opacity:1;
    }
    100%{
        transform:translateY(-110vh) scale(1.5);
        opacity:0;
    }
}
</style>
</head>

<body>

<div class="hearts"></div>

<div class="box">

<h1>🤔 Ek Sawal...</h1>

<p>
Kya aap pehle se gay the,<br>
ya abhi bane ho? 😅
</p>

<button id="yes">Pehle se 😄</button>
<button id="no">Abhi bana 😅</button>
<div id="msg"></div>

</div>

<script>
function yes(){
    document.getElementById("msg").innerHTML =
    "❤️ Yay! You made my day! ❤️";
}

function yes(){
    document.getElementById("msg").innerHTML =
    "😂 Achha! To pehle se the!";
}

function nope(){
    document.getElementById("msg").innerHTML =
    "😂 Achha! To abhi bane ho!";
}}

/* Floating Hearts Animation */
const hearts=document.querySelector(".hearts");

function createHeart(){

const heart=document.createElement("div");

heart.className="heart";
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(18+Math.random()*22)+"px";
heart.style.animationDuration=(4+Math.random()*3)+"s";

hearts.appendChild(heart);

setTimeout(()=>{
heart.remove();
},7000);

}

setInterval(createHeart,300);
</script>

</body>
</html>

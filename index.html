<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Someone Special ❤️</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

.box{
    background:white;
    padding:30px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
    max-width:350px;
}

h1{
    color:#ff3366;
}

button{
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    margin:10px;
    transition:.3s;
}

#yes{
    background:#ff3366;
    color:white;
}

#no{
    background:#ddd;
}

#msg{
    margin-top:20px;
    font-size:22px;
    color:#ff3366;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="box">
    <h1>Will You Be Mine? ❤️</h1>

    <p>I really like you.<br>Will you be my girlfriend? 🥹</p>

    <button id="yes" onclick="yes()">Yes ❤️</button>
    <button id="no" onclick="nope()">No 💔</button>

    <div id="msg"></div>
</div>

<script>
function yes(){
    document.getElementById("msg").innerHTML =
    "Yay! ❤️ You made my day. 😊";
}

function nope(){
    document.getElementById("msg").innerHTML =
    "No worries ❤️ Thanks for being honest. I still wish you all the best. 😊";
}
</script>

</body>
</html>
